steps:
  # 1. Instalar dependências
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # 2. Executar o Build
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # 3. Deploy com Token de Acesso
  - name: 'node:20'
    entrypoint: /bin/sh
    args:
      - -c
      - |
        npx firebase-tools deploy --only hosting --project $PROJECT_ID --token $(gcloud auth print-access-token) --non-interactive

# ESTE BLOCO É O QUE RESOLVE O ERRO DO GATILHO
options:
  logging: CLOUD_LOGGING_ONLY
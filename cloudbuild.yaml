steps:
  # 1. Instalar dependências
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # 2. Executar o Build do Vite
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # 3. Deploy forçando o uso do Token de Autenticação do Google Cloud
  - name: 'node:20'
    entrypoint: /bin/sh
    args:
      - -c
      - |
        npx firebase-tools deploy --only hosting --project $PROJECT_ID --token $(gcloud auth print-access-token)
steps:
  # 1. Instalar dependências
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # 2. Executar o Build de produção (gera a pasta dist/)
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # 3. Deploy para o Firebase Hosting
  # Nota: Você precisará ter o Firebase inicializado no projeto
  - name: 'gcr.io/$PROJECT_ID/firebase'
    args: ['deploy', '--only', 'hosting', '--project', '$PROJECT_ID']

timeout: '1200s'
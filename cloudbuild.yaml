steps:
  # 1. Instalar dependências do projeto
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # 2. Executar o Build (gera a pasta dist/ do Vite)
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # 3. Deploy para Firebase Hosting usando npx (mais seguro e independente)
  - name: 'node:20'
    entrypoint: /bin/sh
    args:
      - -c
      - |
        npx firebase-tools deploy --only hosting --project $PROJECT_ID

# Configurações globais
options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'